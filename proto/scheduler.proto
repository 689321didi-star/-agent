syntax = "proto3";

package scheduler;

option go_package = "github.com/yourname/ai-learning-platform/proto/scheduler";

// SchedulerService 只对内暴露，Task Service 通过 gRPC 调用
service SchedulerService {
  // 提交任务到调度队列
  rpc SubmitTask(SubmitTaskRequest) returns (SubmitTaskResponse);

  // 取消任务
  rpc CancelTask(CancelTaskRequest) returns (CancelTaskResponse);

  // 查询任务状态
  rpc QueryStatus(QueryStatusRequest) returns (QueryStatusResponse);

  // 流式订阅任务进度（双向流，体现 gRPC 流特性）
  rpc WatchTask(WatchTaskRequest) returns (stream TaskProgressEvent);
}

// ── 请求/响应消息 ──────────────────────────────────────────

message SubmitTaskRequest {
  string task_id   = 1;
  uint64 user_id   = 2;
  string goal      = 3;
  int32  priority  = 4;  // 1=最高 10=最低
  int64  deadline  = 5;  // Unix timestamp
  bytes  payload   = 6;  // 序列化的任务参数
}

message SubmitTaskResponse {
  bool   accepted  = 1;
  string message   = 2;
}

message CancelTaskRequest {
  string task_id = 1;
  uint64 user_id = 2;
}

message CancelTaskResponse {
  bool success = 1;
}

message QueryStatusRequest {
  string task_id = 1;
}

message QueryStatusResponse {
  string task_id    = 1;
  TaskStatus status = 2;
  int32  progress   = 3;  // 0-100
  string message    = 4;
  int64  updated_at = 5;
}

message WatchTaskRequest {
  string task_id = 1;
}

message TaskProgressEvent {
  string task_id  = 1;
  int32  progress = 2;
  string stage    = 3;  // "searching" / "generating" / "evaluating"
  string message  = 4;
  int64  ts       = 5;
}

enum TaskStatus {
  TASK_STATUS_UNKNOWN  = 0;
  TASK_STATUS_PENDING  = 1;
  TASK_STATUS_RUNNING  = 2;
  TASK_STATUS_DONE     = 3;
  TASK_STATUS_FAILED   = 4;
  TASK_STATUS_RETRY    = 5;
}
